<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin`Syndicate // Trading Performance Terminal</title>
    <!-- Tailwind CSS v4 & Google Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        /* Transisi smooth untuk interaksi elemen */
        * { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .glow-green { box-shadow: 0 0 25px rgba(52, 211, 153, 0.12); }
        .glow-admin { box-shadow: 0 0 35px rgba(59, 130, 246, 0.2); }
        /* Animasi smooth bounce untuk WhatsApp widget */
        @keyframes smoothBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .wa-float { animation: smoothBounce 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-[#0f1420] text-gray-200 min-h-screen selection:bg-emerald-500 selection:text-black antialiased relative pb-20 pt-4">

    <!-- Ornamen Gradasi Background (Sedikit Lebih Terang & Vibrant) -->
    <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute top-1/4 right-1/4 w-[500px] h-[500px] bg-blue-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-5xl mx-auto px-4 pt-6 relative z-10">
        
        <!-- HEADER -->
        <header class="mb-8 flex justify-between items-center bg-[#1e293b]/30 border border-gray-800/80 rounded-2xl p-6 glass">
            <div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)]"></span>
                    <span class="text-xs font-bold tracking-widest text-emerald-400 uppercase mono">Syndicate Ecosystem Log</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-gray-100 to-gray-400 bg-clip-text text-transparent mt-1">
                    Bin`<span class="text-emerald-400">Syndicate</span>
                </h1>
            </div>
            <!-- Titik Akses Rahasia Admin -->
            <div id="admin-indicator" onclick="triggerLogin()" class="w-4 h-4 rounded-full bg-gray-800 border border-gray-700 cursor-pointer hover:scale-125" title="Guest Mode"></div>
        </header>

        <!-- ADMIN CONTROL PANEL (Tersembunyi dari Publik) -->
        <div id="admin-panel" class="hidden border border-blue-500/30 p-6 rounded-2xl mb-8 bg-[#1e293b]/50 glass glow-admin">
            <div class="flex justify-between items-center mb-5 border-b border-gray-800/80 pb-3">
                <h3 class="text-blue-400 font-bold tracking-wide flex items-center gap-2 uppercase text-sm mono">
                    <span>⚡ Operator Terminal (Admin)</span>
                </h3>
                <button onclick="logoutAdmin()" class="text-xs bg-gray-800/80 hover:bg-red-950 hover:text-red-400 px-3 py-1.5 rounded-xl border border-gray-700 transition">
                    Lock Terminal
                </button>
            </div>
            
            <form id="signal-form" onsubmit="addSignal(event)" class="grid grid-cols-1 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider mono">Asset Pair</label>
                    <input type="text" id="form-pair" required placeholder="EURUSD / XAUUSD" class="w-full bg-[#0f1420] border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 uppercase text-sm font-medium">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider mono">Order Type</label>
                    <select id="form-type" class="w-full bg-[#0f1420] border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm font-medium">
                        <option value="BUY">BUY 🟢</option>
                        <option value="SELL">SELL 🔴</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider mono">Net Pips</label>
                    <input type="number" id="form-pips" required placeholder="e.g. 45 or -20" class="w-full bg-[#0f1420] border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm font-medium">
                </div>
                <div class="sm:col-span-3 md:col-span-1 flex items-end">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-lg shadow-blue-600/10">
                        Commit Signal
                    </button>
                </div>
            </form>
        </div>

        <!-- DASHBOARD UTAMA (MENGHITUNG OTOMATIS) -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">
            <!-- Card 1 -->
            <div class="bg-[#1e293b]/20 p-6 rounded-2xl border border-gray-800/80 shadow-md glass relative overflow-hidden hover:border-gray-700">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mono">Total Executed</p>
                <p id="total-trades" class="text-4xl font-extrabold mt-3 tracking-tight text-white mono">0</p>
                <div class="text-[11px] text-gray-500 mt-2">Processed signals database</div>
            </div>
            <!-- Card 2 -->
            <div class="bg-[#1e293b]/20 p-6 rounded-2xl border border-gray-800/80 shadow-md glass relative overflow-hidden hover:border-gray-700">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mono">Win Rate Accuracy</p>
                <p id="win-rate" class="text-4xl font-extrabold mt-3 tracking-tight text-amber-400 mono">0%</p>
                <div class="w-full bg-gray-800 h-1.5 rounded-full mt-3 overflow-hidden">
                    <div id="win-rate-bar" class="bg-gradient-to-r from-amber-500 to-yellow-400 h-full" style="width: 0%"></div>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="bg-[#1e293b]/20 p-6 rounded-2xl border border-gray-800/80 shadow-md glass glow-green relative overflow-hidden hover:border-emerald-900/50">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mono">Compounded Pips</p>
                <p id="total-pips" class="text-4xl font-extrabold mt-3 tracking-tight text-emerald-400 mono">0</p>
                <div id="pips-badge" class="inline-flex text-[10px] font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 mt-2 uppercase tracking-wide mono">Growth Positive</div>
            </div>
        </div>

        <!-- TABEL DATA HISTORIS -->
        <div class="bg-[#1e293b]/10 rounded-2xl border border-gray-800/80 shadow-xl overflow-hidden glass">
            <div class="px-6 py-5 border-b border-gray-800/80 flex justify-between items-center bg-[#1e293b]/30">
                <h2 class="font-bold text-lg tracking-tight">Historical Performance Log</h2>
                <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full border border-gray-700/60 mono">Real-Time Sync</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-[#0f1420]/40 border-b border-gray-800/80 text-gray-400 text-xs font-bold uppercase tracking-wider mono">
                            <th class="p-4 pl-6">Asset / Pair</th>
                            <th class="p-4">Action</th>
                            <th class="p-4">Net Returns</th>
                            <th class="p-4">Outcome</th>
                            <th id="th-action" class="p-4 pr-6 text-right hidden">Manage</th>
                        </tr>
                    </thead>
                    <tbody id="trade-log" class="divide-y divide-gray-800/40">
                        <!-- Diisi otomatis oleh Javascript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- WIDGET INTEGRASI WHATSAPP SALURAN (MELAYANG - FIXED) -->
    <a href="https://whatsapp.com/channel/0029Vb8o5N92ZjCqVGQ1sv2q" target="_blank" rel="noopener noreferrer" 
       style="background-color: #25D366; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);"
       class="wa-float fixed bottom-6 right-6 z-50 flex items-center gap-3 text-white font-bold px-5 py-3 rounded-full group cursor-pointer hover:scale-105 transition-transform duration-300">
        <!-- SVG Logo WhatsApp Premium -->
        <svg class="w-6 h-6 fill-current text-white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.746.953 3.71 1.454 5.709 1.455h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-500 ease-in-out whitespace-nowrap text-sm tracking-wide text-white">
            Join Saluran WA
        </span>
    </a>

    <!-- PROGRAM LOGIC & LOCAL ENGINE -->
    <script>
        // Password Admin Baru (Simpel & Anti-Gagal)
        const DASHBOARD_KEY = "1234"; 
        let isAuthorizedAdmin = false;

        // Data pips default bawaan
        let tradingData = JSON.parse(localStorage.getItem('alphaTradingData')) || [
            { id: 1, pair: "XAUUSD", type: "BUY", pips: 145 },
            { id: 2, pair: "EURUSD", type: "SELL", pips: -30 },
            { id: 3, pair: "GBPUSD", type: "BUY", pips: 85 }
        ];

        function triggerLogin() {
            if (isAuthorizedAdmin) return;
            let securePass = prompt("🔐 Enter Master Authentication Key:");
            if (securePass === DASHBOARD_KEY) {
                isAuthorizedAdmin = true;
                activateAdminConsole();
            } else if (securePass !== null) {
                alert("🚫 Cryptographic Error: Access Denied!");
            }
        }

        function activateAdminConsole() {
            document.getElementById("admin-panel").classList.remove("hidden");
            document.getElementById("th-action").classList.remove("hidden");
            document.getElementById("admin-indicator").className = "w-4 h-4 rounded-full bg-blue-500 border border-blue-400 shadow-[0_0_12px_rgba(59,130,246,0.8)] cursor-pointer";
            renderDashboard();
        }

        function logoutAdmin() {
            isAuthorizedAdmin = false;
            document.getElementById("admin-panel").classList.add("hidden");
            document.getElementById("th-action").classList.add("hidden");
            document.getElementById("admin-indicator").className = "w-4 h-4 rounded-full bg-gray-800 border border-gray-700 cursor-pointer";
            renderDashboard();
        }

        function addSignal(e) {
            e.preventDefault();
            if (!isAuthorizedAdmin) return;

            const pair = document.getElementById("form-pair").value.toUpperCase().trim();
            const type = document.getElementById("form-type").value;
            const pips = parseFloat(document.getElementById("form-pips").value);

            tradingData.unshift({ 
                id: Date.now(),
                pair: pair,
                type: type,
                pips: pips
            });

            pushUpdate();
            document.getElementById("signal-form").reset();
        }

        function deleteSignal(id) {
            if (!isAuthorizedAdmin) return;
            if (confirm("Hapus baris data hasil ini?")) {
                tradingData = tradingData.filter(t => t.id !== id);
                pushUpdate();
            }
        }

        function pushUpdate() {
            localStorage.setItem('alphaTradingData', JSON.stringify(tradingData));
            renderDashboard();
        }

        function renderDashboard() {
            let totalTrades = tradingData.length;
            let wins = tradingData.filter(t => t.pips > 0).length; 
            let totalPips = tradingData.reduce((sum, t) => sum + t.pips, 0);
            let winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;

            document.getElementById("total-trades").innerText = totalTrades;
            document.getElementById("win-rate").innerText = winRate + "%";
            document.getElementById("win-rate-bar").style.width = winRate + "%";
            
            const pipsLabel = document.getElementById("total-pips");
            const badgeLabel = document.getElementById("pips-badge");
            
            pipsLabel.innerText = (totalPips >= 0 ? "+" : "") + totalPips;
            
            if (totalPips >= 0) {
                pipsLabel.className = "text-4xl font-extrabold mt-3 tracking-tight text-emerald-400 mono";
                badgeLabel.innerText = "Growth Positive";
                badgeLabel.className = "inline-flex text-[10px] font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 mt-2 uppercase tracking-wide mono";
            } else {
                pipsLabel.className = "text-4xl font-extrabold mt-3 tracking-tight text-red-400 mono";
                badgeLabel.innerText = "Drawdown Alert";
                badgeLabel.className = "inline-flex text-[10px] font-bold px-2 py-0.5 rounded bg-red-500/10 text-red-400 mt-2 uppercase tracking-wide mono";
            }

            const tableBody = document.getElementById("trade-log");
            tableBody.innerHTML = "";

            if (totalTrades === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500 mono text-xs">No active operations recorded.</td></tr>`;
                return;
            }

            tradingData.forEach(trade => {
                const isWin = trade.pips > 0;
                const actionBtn = isAuthorizedAdmin 
                    ? `<td class="p-4 pr-6 text-right"><button onclick="deleteSignal(${trade.id})" class="text-xs bg-red-500/10 text-red-400 border border-red-500/20 px-2.5 py-1 rounded-lg hover:bg-red-500 hover:text-white transition">Delete</button></td>` 
                    : '';

                const row = `
                    <tr class="hover:bg-gray-800/10 border-b border-gray-800/30">
                        <td class="p-4 pl-6 font-bold text-gray-100 uppercase tracking-tight">${trade.pair}</td>
                        <td class="p-4">
                            <span class="px-2.5 py-0.5 rounded-md text-xs font-bold tracking-wide mono ${trade.type === 'BUY' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}">
                                ${trade.type}
                            </span>
                        </td>
                        <td class="p-4 font-bold mono ${isWin ? 'text-emerald-400' : 'text-red-400'}">${trade.pips >= 0 ? '+' : ''}${trade.pips} pips</td>
                        <td class="p-4">
                            <span class="flex items-center gap-1.5 font-semibold text-xs ${isWin ? 'text-emerald-400' : 'text-red-400'}">
                                <span class="w-1.5 h-1.5 rounded-full ${isWin ? 'bg-emerald-400' : 'bg-red-400'}"></span>
                                ${isWin ? 'PROFIT' : 'LOSS'}
                            </span>
                        </td>
                        ${actionBtn}
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        renderDashboard();
    </script>
</body>
</html>
